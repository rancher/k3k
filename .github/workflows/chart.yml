name: Chart

on:
  workflow_dispatch:

permissions:
    contents: write

env:
  HELM_VERSION: v4.1.3
  HELM_BIN_HASH_AMD64: 02ce9722d541238f81459938b84cf47df2fdf1187493b4bfb2346754d82a4700

jobs:
  chart-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
          fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

    - name: Install helm
      run: |
        curl -sSfL -o helm.tar.gz https://get.helm.sh/helm-${{ env.HELM_VERSION }}-linux-amd64.tar.gz
        echo "${{ env.HELM_BIN_HASH_AMD64 }}  helm.tar.gz" | shasum -a 256 --check
        tar -xvzf helm.tar.gz --strip-components=1 -C /tmp/
        sudo mv /tmp/helm /usr/local/bin
        sudo chmod +x /usr/local/bin/helm

    - name: Run chart-releaser
      uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
      with:
        config: .cr.yaml
      env:
        CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
