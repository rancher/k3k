version: "2"

linters:
  enable:
  exclusions:
    rules:
    # Allow dot imports for Ginkgo/Gomega in test framework
    - path: tests/framework/
      text: "dot imports"
      linters:
      - staticcheck

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
  settings:
    gci:
      # The default order is `standard > default > custom > blank > dot > alias > localmodule`.
      custom-order: true
      sections:
        - standard
        - default
        - alias
        - localmodule
        - dot
        - blank
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
